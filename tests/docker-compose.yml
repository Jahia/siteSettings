version: '3.6'
services:
    mariadb:
        image: library/mariadb:10-focal
        container_name: mariadb
        deploy:
            resources:
                limits:
                    memory: 1gb
        extra_hosts:
          - "mariadb:172.18.0.5"
        networks:
          default:
            ipv4_address: 172.18.0.5
        command: --max_allowed_packet=1073741824 --transaction-isolation=READ-UNCOMMITTED --innodb-lock-wait-timeout=10
        environment:
            MYSQL_ROOT_PASSWORD: root1234
            MYSQL_DATABASE: jahia
            MYSQL_USER: jahia
            MYSQL_PASSWORD: jahia
            TZ: ${TIMEZONE}

    jahia:
        image: '${JAHIA_IMAGE}'
        container_name: jahia
        restart: 'no'
        deploy:
            resources:
                limits:
                    memory: 4gb
        depends_on:
            - mariadb
        extra_hosts:
          - "jahia:172.18.0.10"
          - "jahia-browsing-a:172.18.0.11"
          - "jahia-browsing-b:172.18.0.12"
        networks:
          default:
            ipv4_address: 172.18.0.10
        ports:
            - "8080:8080"
            - "8101:8101"
            - "8000:8000"
        environment:
            jahia_cfg_karaf_remoteShellHost: 0.0.0.0
            DB_VENDOR: mariadb
            DB_HOST: mariadb
            DB_NAME: jahia
            DB_USER: jahia
            DB_PASS: jahia
            JAHIA_LICENSE: ${JAHIA_LICENSE}
            SUPER_USER_PASSWORD: ${JAHIA_PASSWORD}
            CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
            PROCESSING_SERVER: 'true'
            MAX_RAM_PERCENTAGE: 95
            JAHIA_PROPERTIES: ${JAHIA_PROPERTIES}
            CATALINA_OPTS: ${CATALINA_OPTS}
            RESTORE_MODULE_STATES: 'false'
            NEXUS_USERNAME: ${NEXUS_USERNAME}
            NEXUS_PASSWORD: ${NEXUS_PASSWORD}
            TZ: ${TIMEZONE}
            JPDA: 'true'

    jahia-browsing-a:
        image: '${JAHIA_IMAGE}'
        container_name: jahia-browsing-a
        restart: 'no'
        deploy:
            resources:
                limits:
                    memory: 4gb
        depends_on:
            - mariadb
            - jahia
        extra_hosts:
          - "jahia:172.18.0.10"
          - "jahia-browsing-a:172.18.0.11"
          - "jahia-browsing-b:172.18.0.12"
        networks:
          default:
            ipv4_address: 172.18.0.11
        ports:
            - '8081:8080'
            - '8102:8101'
        environment:
            jahia_cfg_karaf_remoteShellHost: 0.0.0.0
            DB_VENDOR: mariadb
            DB_HOST: mariadb
            DB_NAME: jahia
            DB_USER: jahia
            DB_PASS: jahia
            JAHIA_LICENSE: ${JAHIA_LICENSE}
            SUPER_USER_PASSWORD: ${JAHIA_PASSWORD}
            CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
            PROCESSING_SERVER: 'false'
            PROCESSING_HOST: jahia
            MAX_RAM_PERCENTAGE: 95
            JAHIA_PROPERTIES: ${JAHIA_PROPERTIES}
            CATALINA_OPTS: ${CATALINA_OPTS}
            RESTORE_MODULE_STATES: 'false'
            NEXUS_USERNAME: ${NEXUS_USERNAME}
            NEXUS_PASSWORD: ${NEXUS_PASSWORD}
            TZ: ${TIMEZONE}

    jahia-browsing-b:
        image: '${JAHIA_IMAGE}'
        container_name: jahia-browsing-b
        restart: 'no'
        deploy:
            resources:
                limits:
                    memory: 4gb
        depends_on:
            - mariadb
            - jahia
        extra_hosts:
          - "jahia:172.18.0.10"
          - "jahia-browsing-a:172.18.0.11"
          - "jahia-browsing-b:172.18.0.12"
        networks:
          default:
            ipv4_address: 172.18.0.12
        ports:
            - '8082:8080'
            - '8103:8101'
        environment:
            jahia_cfg_karaf_remoteShellHost: 0.0.0.0
            DB_VENDOR: mariadb
            DB_HOST: mariadb
            DB_NAME: jahia
            DB_USER: jahia
            DB_PASS: jahia
            JAHIA_LICENSE: ${JAHIA_LICENSE}
            SUPER_USER_PASSWORD: ${JAHIA_PASSWORD}
            CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
            PROCESSING_SERVER: 'false'
            PROCESSING_HOST: jahia
            MAX_RAM_PERCENTAGE: 95
            JAHIA_PROPERTIES: ${JAHIA_PROPERTIES}
            CATALINA_OPTS: ${CATALINA_OPTS}
            RESTORE_MODULE_STATES: 'false'
            TZ: ${TIMEZONE}
            NEXUS_USERNAME: ${NEXUS_USERNAME}
            NEXUS_PASSWORD: ${NEXUS_PASSWORD}
    # Cypress container
    cypress:
      image: '${TESTS_IMAGE}'
      # https://github.com/cypress-io/cypress/issues/350
      ipc: host
      container_name: cypress
      deploy:
        resources:
          limits:
            memory: 4gb
      depends_on:
        - jahia
      environment:
        # Uses variable substitution: https://docs.docker.com/compose/compose-file/compose-file-v3/#variable-substitution
        MANIFEST: ${MANIFEST:-provisioning-manifest-build.yml}
        JAHIA_USERNAME: ${JAHIA_USERNAME}
        JAHIA_PASSWORD: ${JAHIA_PASSWORD}
        JAHIA_URL: ${JAHIA_URL}
        JAHIA_HOST: ${JAHIA_HOST}
        JAHIA_PORT: ${JAHIA_PORT}
        NEXUS_USERNAME: ${NEXUS_USERNAME}
        NEXUS_PASSWORD: ${NEXUS_PASSWORD}
        SUPER_USER_PASSWORD: ${SUPER_USER_PASSWORD}
        JAHIA_CLUSTER_ENABLED: '${JAHIA_CLUSTER_ENABLED}'
        TZ: ${TIMEZONE}
      networks:
        default:
          ipv4_address: 172.18.0.20
      extra_hosts:
        - "jahia:172.18.0.10"
        - "jahia-browsing-a:172.18.0.11"
        - "jahia-browsing-b:172.18.0.12"
networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16
